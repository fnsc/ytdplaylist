services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - ./downloads:/downloads
      - ${EXCEL_PATH:-./playlist.xlsx}:/input/playlist.xlsx:ro
      - "${HOME}/Library/Application Support/Firefox:/root/.mozilla/firefox:ro"
    working_dir: /downloads
    command: ["${ARTIST}", "/input/playlist.xlsx"]
